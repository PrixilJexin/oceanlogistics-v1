<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14110f"/>
      <stop offset="100%" stop-color="#080706"/>
    </linearGradient>
    <linearGradient id="bark-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#543d2b"/>
      <stop offset="50%" stop-color="#3b2b1e"/>
      <stop offset="100%" stop-color="#241910"/>
    </linearGradient>
    <linearGradient id="wood-inside" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9ac7e"/>
      <stop offset="100%" stop-color="#a6774e"/>
    </linearGradient>
    <radialGradient id="ring-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#080706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg-grad)"/>

  <!-- Ambient Glow -->
  <circle cx="200" cy="200" r="150" fill="url(#ring-glow)"/>

  <!-- Stacked Logs Structure -->
  <!-- Log 1 (Bottom Left) -->
  <g transform="translate(70, 200)">
    <!-- Bark cylinder -->
    <path d="M 0,40 L 160,40 A 25,45 0 0,0 160,-40 L 0,-40 Z" fill="url(#bark-grad)" stroke="#241910" stroke-width="1.5"/>
    <!-- Wood end-grain ellipse -->
    <ellipse cx="0" cy="0" rx="25" ry="40" fill="url(#wood-inside)" stroke="#664d38" stroke-width="2"/>
    <!-- Rings -->
    <ellipse cx="0" cy="0" rx="17" ry="27" fill="none" stroke="#8a6344" stroke-width="1.25" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="9" ry="15" fill="none" stroke="#8a6344" stroke-width="1.25" opacity="0.85"/>
    <!-- Wood cracks -->
    <path d="M 0,0 L 15,10 M 0,0 L -10,-25 M 0,0 L 5,-30 M 0,0 L -15,15" stroke="#4a3424" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Log 2 (Bottom Right - slightly recessed) -->
  <g transform="translate(160, 230) scale(0.9)">
    <path d="M 0,40 L 160,40 A 25,45 0 0,0 160,-40 L 0,-40 Z" fill="url(#bark-grad)" stroke="#1a120b" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="25" ry="40" fill="url(#wood-inside)" stroke="#594331" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="16" ry="26" fill="none" stroke="#7a573b" stroke-width="1" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="8" ry="13" fill="none" stroke="#7a573b" stroke-width="1" opacity="0.8"/>
    <path d="M 0,0 L 10,-20 M 0,0 L -12,12" stroke="#4a3424" stroke-width="1.5"/>
  </g>

  <!-- Log 3 (Top Center - stacked on top) -->
  <g transform="translate(110, 140) scale(1.05)">
    <!-- Bark cylinder -->
    <path d="M 0,40 L 160,40 A 25,45 0 0,0 160,-40 L 0,-40 Z" fill="url(#bark-grad)" stroke="#241910" stroke-width="2"/>
    <!-- Wood end-grain ellipse -->
    <ellipse cx="0" cy="0" rx="25" ry="40" fill="url(#wood-inside)" stroke="#664d38" stroke-width="2.5"/>
    <!-- Rings -->
    <ellipse cx="0" cy="0" rx="18" ry="29" fill="none" stroke="#8a6344" stroke-width="1.5" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="11" ry="18" fill="none" stroke="#8a6344" stroke-width="1.5" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="5" ry="8" fill="none" stroke="#8a6344" stroke-width="1.5" opacity="0.9"/>
    <!-- Wood cracks -->
    <path d="M 0,0 L -5,28 M 0,0 L 18,-15 M 0,0 L -15,-20" stroke="#4a3424" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Warm glow overlay on logs -->
  <path d="M 110,140 L 270,140 M 70,200 L 230,200" stroke="#D4A843" stroke-width="1" opacity="0.3" filter="blur(2px)"/>
</svg>
