<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111215"/>
      <stop offset="100%" stop-color="#08080a"/>
    </linearGradient>
    <linearGradient id="metal-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4d55"/>
      <stop offset="50%" stop-color="#2a2c31"/>
      <stop offset="100%" stop-color="#141518"/>
    </linearGradient>
    <linearGradient id="metal-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3c3e44"/>
      <stop offset="50%" stop-color="#222327"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
    <linearGradient id="gold-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8c6c1f"/>
    </linearGradient>
    <radialGradient id="ambient-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a4d55" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#08080a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg-grad)"/>

  <!-- Ambient Glow -->
  <circle cx="200" cy="200" r="160" fill="url(#ambient-glow)"/>

  <!-- Industrial Stack/Abstract Coke Heap Geometry -->
  <g transform="translate(20, 10)">
    <!-- Backing silhouette shadow -->
    <path d="M 60,280 L 180,90 L 300,280 Z" fill="#090a0c" opacity="0.5" filter="blur(4px)"/>

    <!-- Central Coke Crystal/Structure Block -->
    <!-- Left Facet -->
    <polygon points="180,90 100,200 180,260" fill="url(#metal-grad-1)" stroke="#5c606b" stroke-width="1"/>
    <!-- Right Facet -->
    <polygon points="180,90 180,260 260,180" fill="url(#metal-grad-2)" stroke="#3f4249" stroke-width="1"/>
    <!-- Bottom Facet -->
    <polygon points="100,200 180,260 140,290" fill="#1b1c1e" stroke="#2c2d32" stroke-width="1"/>
    <polygon points="180,260 260,180 220,270" fill="#0f1012" stroke="#202124" stroke-width="1"/>

    <!-- Gold Accent Line representing premium metallurgical value / calcined highlight -->
    <line x1="180" y1="90" x2="180" y2="260" stroke="url(#gold-highlight)" stroke-width="2" filter="drop-shadow(0px 0px 3px rgba(212, 168, 67, 0.5))"/>

    <!-- Porous texture circles (Coke is highly porous) -->
    <circle cx="150" cy="150" r="3" fill="#0d0d0f" opacity="0.8"/>
    <circle cx="165" cy="180" r="4.5" fill="#0d0d0f" opacity="0.9"/>
    <circle cx="140" cy="190" r="2.5" fill="#0d0d0f" opacity="0.7"/>
    <circle cx="130" cy="165" r="4" fill="#0d0d0f" opacity="0.8"/>
    
    <circle cx="210" cy="160" r="3.5" fill="#050506" opacity="0.9"/>
    <circle cx="225" cy="200" r="2" fill="#050506" opacity="0.8"/>
    <circle cx="200" cy="220" r="4" fill="#050506" opacity="0.9"/>
    <circle cx="230" cy="175" r="3" fill="#050506" opacity="0.7"/>
    
    <!-- Fine Highlights -->
    <line x1="100" y1="200" x2="180" y2="260" stroke="#7e8594" stroke-width="0.75" stroke-dasharray="2, 5"/>
    <line x1="180" y1="260" x2="260" y2="180" stroke="#5c606b" stroke-width="0.75" stroke-dasharray="3, 4"/>
  </g>

  <!-- Smaller Coke Piece Left -->
  <g transform="translate(-50, 90) scale(0.65)">
    <polygon points="150,170 210,140 240,220 160,250" fill="url(#metal-grad-2)" stroke="#444" stroke-width="1"/>
    <polygon points="210,140 240,220 280,180" fill="#141518" stroke="#222" stroke-width="1"/>
    <circle cx="190" cy="190" r="3.5" fill="#000" opacity="0.8"/>
    <circle cx="210" cy="210" r="2" fill="#000" opacity="0.7"/>
  </g>

  <!-- Smaller Coke Piece Right -->
  <g transform="translate(140, 110) scale(0.6)">
    <polygon points="160,180 230,160 210,240 130,220" fill="url(#metal-grad-1)" stroke="#555" stroke-width="1"/>
    <polygon points="230,160 210,240 250,210" fill="#0a0a0c" stroke="#222" stroke-width="1"/>
  </g>
</svg>
