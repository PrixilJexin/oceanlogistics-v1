<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="coal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#303030"/>
      <stop offset="50%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF5500" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ambient-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg-grad)"/>

  <!-- Ambient Glow -->
  <circle cx="200" cy="220" r="160" fill="url(#ambient-glow)"/>

  <!-- Glowing Embers Effect (Background layer of the coal) -->
  <path d="M 120,280 L 200,120 L 280,280 Z" fill="url(#glow-grad)" filter="blur(8px)"/>
  
  <!-- Main Charcoal Geometric Block -->
  <g transform="translate(10, -10)">
    <!-- Back Facet -->
    <polygon points="150,150 250,130 280,200 230,270 130,220" fill="#181818" stroke="#262626" stroke-width="1.5"/>
    
    <!-- Top Facet -->
    <polygon points="150,150 250,130 200,210" fill="url(#coal-grad)" stroke="#3a3a3a" stroke-width="1.5"/>
    
    <!-- Left Facet -->
    <polygon points="150,150 200,210 130,270" fill="#1f1f1f" stroke="#333" stroke-width="1.5"/>
    
    <!-- Right Facet -->
    <polygon points="250,130 200,210 270,260" fill="#0d0d0d" stroke="#222" stroke-width="1.5"/>
    
    <!-- Bottom Facets with Glow cracks -->
    <polygon points="200,210 130,270 210,290" fill="#151515" stroke="#2e2e2e" stroke-width="1.5"/>
    <polygon points="200,210 270,260 210,290" fill="#0a0a0a" stroke="#222" stroke-width="1.5"/>
    
    <!-- Glowing fissures/cracks -->
    <path d="M 200,210 L 210,290" stroke="#D4A843" stroke-width="3" stroke-linecap="round" filter="drop-shadow(0px 0px 4px #FF5500)"/>
    <path d="M 200,210 L 170,240" stroke="#FF8800" stroke-width="2" stroke-linecap="round"/>
    <path d="M 220,180 L 250,130" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Smaller Charcoal Piece Forefront Left -->
  <g transform="translate(-40, 60) scale(0.7)">
    <polygon points="140,200 220,180 180,260 110,240" fill="url(#coal-grad)" stroke="#444" stroke-width="1"/>
    <polygon points="220,180 180,260 240,270" fill="#111" stroke="#222" stroke-width="1"/>
    <polygon points="180,260 110,240 160,300" fill="#1c1c1c" stroke="#2c2c2c" stroke-width="1"/>
    <polygon points="180,260 240,270 160,300" fill="#090909" stroke="#1c1c1c" stroke-width="1"/>
    <!-- Crack -->
    <path d="M 180,260 L 160,300" stroke="#FF5500" stroke-width="2.5" stroke-linecap="round" filter="drop-shadow(0px 0px 3px #FF2200)"/>
  </g>

  <!-- Small Charcoal Piece Forefront Right -->
  <g transform="translate(130, 80) scale(0.6)">
    <polygon points="180,180 250,210 200,260 140,220" fill="#242424" stroke="#444" stroke-width="1"/>
    <polygon points="250,210 200,260 260,280" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
    <polygon points="200,260 140,220 180,310" fill="url(#coal-grad)" stroke="#2c2c2c" stroke-width="1"/>
    <polygon points="200,260 260,280 180,310" fill="#050505" stroke="#1a1a1a" stroke-width="1"/>
  </g>

  <!-- Spark particles rising -->
  <circle cx="210" cy="100" r="2.5" fill="#D4A843" opacity="0.8" filter="drop-shadow(0px 0px 2px #FF5500)"/>
  <circle cx="170" cy="140" r="1.5" fill="#FF8800" opacity="0.6"/>
  <circle cx="260" cy="120" r="2" fill="#D4A843" opacity="0.7"/>
  <circle cx="130" cy="180" r="1.5" fill="#FF5500" opacity="0.5"/>
  <circle cx="230" cy="60" r="2" fill="#D4A843" opacity="0.9" filter="drop-shadow(0px 0px 3px #FF8800)"/>
  <circle cx="190" cy="80" r="1" fill="#FF8800" opacity="0.6"/>
</svg>
